metadata:
  id: "youtube_factory_default_channel_pack"
  version: 1
  status: "dry_run_ready"
  updated_at: "2026-04-14"
  owner: "gtm"
  purpose: "Default publish-ready channel seed for the first faceless YouTube business in this repo."
  source_docs:
    - "channel-strategy.yaml"
    - "content-backlog.yaml"
    - "launch-collateral.md"
    - "monetization-registry.yaml"
    - "partner-matrix.yaml"
    - "automation-sops.yaml"

workspace:
  workspace_id: "back-office-ai-default"
  pipeline_id: "youtube-factory"
  publish_mode: "dry_run_until_human_approval"
  default_language: "en"
  default_market: "US"

channel:
  brand_name: "Back Office AI"
  handle_options:
    - "@backofficeai"
    - "@backofficeops"
    - "@smallteamaibackoffice"
  thesis: "AI Back Office for Small Teams"
  tagline: "Build the AI back office before you hire for manual chaos."
  short_bio: "AI systems for small teams that are tired of doing ops the hard way."
  about_section: "Back Office AI shows founder-led teams how to automate the boring but expensive parts of running a business: inbox triage, follow-ups, reporting, onboarding, support, SOPs, and meeting cleanup. Every video is built around one real workflow, one clear outcome, and one operating asset you can actually use."
  banner:
    headline: "Build the AI Back Office"
    subhead: "Practical systems for lean teams"
    cta_strip: "Free starter pack below"
  brand_voice:
    writing_style:
      - "plainspoken"
      - "operator-grade"
      - "opinionated"
      - "calmly skeptical"
    narration_direction: "Warm storyteller with dramatic confidence. Closer to a documentary explainer than a hype creator."
    banned_modes:
      - "guru urgency"
      - "passive income framing"
      - "enterprise buzzword soup"
      - "full-autonomy overclaiming"
  render_defaults:
    format: "long_form_first"
    target_duration_minutes: "8-12"
    scene_order:
      - "cold_open"
      - "problem_framing"
      - "system_map"
      - "step_walkthrough"
      - "proof_asset_reveal"
      - "cta_endcard"
    music_direction: "restrained orchestral tension under the hook, lighter bed during walkthroughs"
    visual_motifs:
      - "inboxes"
      - "checklists"
      - "calendar blocks"
      - "CRM stages"
      - "workflow arrows"
      - "dashboard cards"
  playlists:
    - id: "ai_roles"
      title: "AI Roles for Small Teams"
      description: "Episodes that replace the first 2-3 hours of a role with a usable system."
    - id: "workflow_rebuilds"
      title: "Workflow Rebuilds"
      description: "Before-and-after rebuilds for small-team operations."
    - id: "operator_stacks"
      title: "Best AI Stacks"
      description: "Lean software stacks for specific back-office jobs."
    - id: "templates_playbooks"
      title: "Templates and Playbooks"
      description: "Downloadable assets and implementation guides for repeatable workflows."

audience:
  primary_icp:
    - "agency owners"
    - "consultancy founders"
    - "small B2B service firms"
    - "fractional operators"
  team_size: "2-20"
  budget_signal: "already paying for 2-10 software tools"
  jobs_to_be_done:
    - "Show me one workflow I can deploy this week."
    - "Help me avoid hiring for a broken manual process."
    - "Make my team look organized without enterprise overhead."
  pain_words:
    - "inbox overload"
    - "follow-up drift"
    - "meeting sprawl"
    - "reporting drag"
    - "onboarding chaos"
    - "support handoff mess"

launch_defaults:
  flagship_episode_id: "vid_01"
  first_four_publish_order:
    - "vid_01"
    - "vid_03"
    - "vid_10"
    - "vid_06"
  cadence:
    publish_days:
      - "Monday"
      - "Thursday"
    review_day: "Wednesday"
    cutdown_day: "Friday"
  testing_rules:
    - "Do not introduce Shorts until one long-form pillar wins on both CTR and CTA clicks."
    - "Do not add sponsors before one pillar clears baseline view floors."
    - "Swap packaging only when a metric problem is named."

offer_defaults:
  primary_lead_magnet:
    offer_id: "ai_back_office_starter_pack"
    name: "AI Back Office Starter Pack"
    promise: "5 workflows every small team should automate before hiring"
    asset_stack:
      - "PDF"
      - "Notion links"
      - "prompt pack"
    landing_page:
      slug: "/starter-pack"
      headline: "Build the AI back office before you hire for manual chaos."
      subhead: "Get the starter pack with 5 practical workflows for inbox triage, follow-ups, reporting, SOPs, and meeting cleanup."
      cta_label: "Get the Starter Pack"
      delivery_method: "email capture plus instant thank-you page"
      status: "needs_real_domain_before_publish"
  supporting_assets:
    - offer_id: "workflow_checklists"
      canonical_asset: "Inbox Triage Workflow Checklist"
    - offer_id: "workflow_checklists"
      canonical_asset: "Meeting-to-Action Playbook"
    - offer_id: "workflow_checklists"
      canonical_asset: "Client Onboarding Automation Checklist"
    - offer_id: "workflow_checklists"
      canonical_asset: "Founder-Led Sales Follow-Up Kit"
  revenue_ladder:
    - "lead_magnet"
    - "affiliate"
    - "low_ticket_template_pack"
    - "audit"
    - "implementation_sprint"
    - "sponsor"
    - "ads"

distribution_defaults:
  description_structure:
    - "primary_cta"
    - "video_bullets"
    - "tools_mentioned"
    - "secondary_cta"
    - "disclosure"
  pinned_comment_structure:
    - "primary_cta"
    - "workflow_request_prompt"
  title_rules:
    min_chars: 45
    max_chars: 62
    must_include:
      - "one workflow"
      - "one pain word"
    avoid:
      - "make money"
      - "passive income"
      - "full autopilot"
      - "replace your whole team"
  thumbnail_rules:
    max_words: 4
    required_pattern: "one focal object, one contrast, one short pain phrase"
    avoid:
      - "robot faces"
      - "money stacks"
      - "logo spam"
      - "collage layouts"
  link_placeholders:
    owned_audience_base_url: "{{owned_audience_base_url}}"
    audit_base_url: "{{audit_base_url}}"
    stack_base_url: "{{stack_base_url}}"
  utm_defaults:
    source: "youtube"
    mediums:
      longform_description: "longform_description"
      pinned_comment: "pinned_comment"
    campaign_pattern: "{{offer_id}}-{{video_slug}}"

email_defaults:
  welcome_sequence:
    - day_offset: 0
      subject: "Your AI Back Office starter pack"
      goal: "deliver the asset and set the channel promise"
    - day_offset: 2
      subject: "The first workflow I would automate in a 5-person business"
      goal: "send subscribers back to a flagship video"
    - day_offset: 5
      subject: "Want your workflow audited?"
      goal: "introduce the audit offer after value delivery"

qa_defaults:
  hard_gates:
    - "One workflow per video."
    - "One primary CTA per video."
    - "The proof asset appears before the CTA."
    - "Title, thumbnail, and first description lines must point at the same promise."
    - "No sponsor placement before proof."
    - "No compliance or claim-risk issues."
  soft_gates:
    - "The asset feels deployable inside one week."
    - "The language sounds like an operator, not a trend chaser."
    - "The episode teaches a framework, not just a tool list."

approval_boundaries:
  require_human_approval_for:
    - "linking a real YouTube account"
    - "linking paid third-party tools or buying subscriptions"
    - "live publishing any video"
    - "accepting sponsor or affiliate legal terms"
    - "committing real spend"
