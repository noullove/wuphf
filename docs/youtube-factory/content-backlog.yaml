channel:
  primary_brand: "Back Office AI"
  thesis: "AI Back Office for Small Teams"
  launch_wedge: "Founder-led service businesses and agencies with 2-20 people"

backlog_rules:
  scoring_weights:
    pain: 5
    buyer_intent: 5
    originality: 5
    product_fit: 5
  publishing_rule: "Ship the highest-scoring episode that also balances the pillar mix and CTA mix."
  no_go_topics:
    - "generic AI news"
    - "passive income with AI"
    - "celebrity or clip compilation content"
    - "workflow claims with no demonstrable before/after"

tier_plan:
  - id: tier_1_launch
    label: "First 10 videos"
    purpose: "Prove packaging, email capture, and one affiliate category."
  - id: tier_2_prove_winners
    label: "Second 10 videos"
    purpose: "Double down on winning pain words and identify one product wedge."
  - id: tier_3_expand_catalog
    label: "Third 10 videos"
    purpose: "Broaden into adjacent workflows once the core lane is established."

