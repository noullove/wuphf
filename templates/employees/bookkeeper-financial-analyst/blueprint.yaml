  - Draft the reporting cadence.
  - Identify missing source documents.
automated_loops:
  - Reconcile new records and flag mismatches.
  - Produce weekly financial review packets.
skills:
  - bookkeeping
  - reconciliation
  - invoicing
  - financial analysis
tools:
  - Google Sheets
  - Gmail
  - Drive
  - accounting software
  - Slack
expected_results:
  - Clean ledgers and invoices
  - Regular financial reports
  - Clear approval points for anomalies
used_by:
  - bookkeeping-invoicing-service
  - local-business-ai-package
  - niche-crm
