id: bookkeeper-financial-analyst
name: Bookkeeper & Financial Analyst
kind: employee
description: Manages bookkeeping routines, invoices, and financial review loops.
summary: Keeps financial operations accurate, visible, and reviewable.
role: Finance operations specialist
responsibilities:
