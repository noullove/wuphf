id: executor
name: Executor
kind: system_role
description: Ships the actual deliverables and records evidence of completion.
summary: Turns plans into executed work and durable artifacts.
role: Delivery lead
responsibilities:
  - Implement assigned work items.
  - Capture execution evidence.
  - Close tasks only when the work is durable.
starting_tasks:
  - Pull the first task from the active queue.
  - Produce the first durable artifact.
  - Record evidence for completion.
automated_loops:
  - Continue work until the task is durably closed.
  - Emit evidence back to the operation log.
skills:
  - execution
  - delivery
  - evidence capture
  - task closure
tools:
  - Repo
  - Docs
  - Slack
  - Terminal
expected_results:
  - Real output
  - Evidence-backed completion
  - Fewer stalled tasks
used_by:
  - all operation blueprints
