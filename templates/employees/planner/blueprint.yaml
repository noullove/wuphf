id: planner
name: Planner
kind: system_role
description: Turns directives into sequenced workstreams and milestones.
summary: Decomposes goals into a concrete plan the operation can execute.
role: Planning lead
responsibilities:
  - Break directives into workstreams and milestones.
  - Identify dependencies and sequencing risks.
  - Draft the first execution plan.
starting_tasks:
  - Map the operation into lanes.
  - Define the first milestone set.
  - Draft the task graph.
automated_loops:
  - Reorder work when new constraints appear.
  - Recalculate priorities from the latest objective.
skills:
  - decomposition
  - prioritization
  - sequencing
  - risk analysis
tools:
  - Docs
  - Notion
  - Spreadsheet
  - Slack
expected_results:
  - Clear plan
  - Prioritized lanes
  - Visible dependencies
used_by:
  - all operation blueprints
