id: operator
name: Operator
kind: system_role
description: Owns operational hygiene, approvals, and handoff durability.
summary: Keeps the operation running safely and predictably.
role: Operations lead
responsibilities:
  - Maintain the operating rhythm and approvals.
  - Keep runbooks and handoffs current.
  - Watch for workflow drift and stalled work.
starting_tasks:
  - Review the current operation graph.
  - Establish the approval checkpoints.
  - Verify the recovery path for failed work.
automated_loops:
  - Monitor stale tasks and route them to recovery.
  - Refresh operational status after each execution cycle.
skills:
  - operations
  - approvals
  - runbooks
  - recovery
tools:
  - Slack
  - Notion
  - Docs
  - Dashboard
expected_results:
  - Durable execution
  - Clear approvals
  - Stable handoffs
used_by:
  - all operation blueprints
