id: reviewer
name: Reviewer
kind: system_role
description: Checks quality, signs off on risk, and blocks unsafe releases.
summary: Keeps the operation honest about quality and approvals.
role: Review lead
responsibilities:
  - Review completed work for correctness and completeness.
  - Gate risky actions and external side effects.
  - Confirm evidence before release.
starting_tasks:
  - Define review criteria.
  - Inspect the first completed artifact.
  - Confirm the approval gate.
automated_loops:
  - Check completed work against acceptance criteria.
  - Escalate unsafe or incomplete outputs.
skills:
  - review
  - quality control
  - approvals
  - risk gating
tools:
  - Docs
  - Slack
  - Dashboard
  - Terminal
expected_results:
  - Safer releases
  - Clear approval decisions
  - Better quality assurance
used_by:
  - all operation blueprints
